<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实验三：冲突范式生成器</title>
    <style>
        :root { --panel-bg: #ffffff; --body-bg: #f1f5f9; --accent: #2563eb; --yellow: rgb(235, 240, 170); --blue: rgb(125, 205, 205); }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--body-bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: var(--panel-bg); display: grid; grid-template-columns: 360px 1fr; gap: 20px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1400px; width: 100%; }
        .sidebar { border-right: 1px solid #e2e8f0; padding-right: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 90vh; }
        h2 { font-size: 1.1rem; margin: 0; color: #1e293b; border-left: 4px solid var(--accent); padding-left: 12px; }
        .control-group { display: flex; flex-direction: column; gap: 6px; padding: 10px; border-radius: 8px; background: #f8fafc; border: 1px solid #eef2f6; }
        label { font-size: 0.75rem; font-weight: 700; color: #64748b; display: flex; justify-content: space-between; }
        .val-display { color: var(--accent); font-family: monospace; }
        select, input[type="range"], input[type="number"], button { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.8rem; box-sizing: border-box; }
        
        .btn-main { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; height: 40px; margin-top: 10px; transition: 0.2s; }
        .btn-main:hover { background: #1d4ed8; }
        .btn-sub { background: #10b981; color: white; border: none; cursor: pointer; margin-top: 5px; height: 35px; font-weight: bold; }

        .stats-box { background: #1e293b; color: #f1f5f9; padding: 12px; border-radius: 8px; font-size: 0.75rem; font-family: monospace; line-height: 1.6; }
        .canvas-card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        canvas { background: #fff; box-shadow: 0 0 15px rgba(0,0,0,0.05); border-radius: 4px; border: 1px solid #ddd; }
        .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <h2>实验参数控制</h2>
        
        <div class="control-group">
            <label>实验条件 (Condition)</label>
            <select id="cond-in">
                <option value="Congruent">一致条件 (Congruent)</option>
                <option value="LowConflict">低冲突 (LowConflict)</option>
                <option value="HighConflict">高冲突 (HighConflict)</option>
                <option value="Baseline">基线组 (Baseline)</option>
                <option value="Custom">自定义 (Custom)</option>
            </select>
        </div>

        <div class="control-group">
            <label>图形总数量 (N) <span class="val-display" id="n-lab">36</span></label>
            <input type="number" id="n-in" min="4" max="150" value="36">
        </div>

        <div class="control-group">
            <label>全局排布形状</label>
            <select id="layout-in">
                <option value="circle">圆形区域 (Vogel Spiral)</option>
                <option value="rect">矩形区域 (Jittered Grid)</option>
            </select>
        </div>

        <div id="custom-params">
            <div class="control-group">
                <label>黄色图形占比 <span class="val-display" id="py-lab">50%</span></label>
                <input type="range" id="py-in" min="0" max="100" value="50">
            </div>
            <div class="control-group">
                <label>黄色中三角形占比 <span class="val-display" id="tsy-lab">100%</span></label>
                <input type="range" id="tsy-in" min="0" max="100" value="100">
            </div>
            <div class="control-group">
                <label>蓝色中正方形占比 <span class="val-display" id="bsb-lab">100%</span></label>
                <input type="range" id="bsb-in" min="0" max="100" value="100">
            </div>
        </div>

        <div class="control-group">
            <label>位置抖动 (防遮挡控制) <span class="val-display" id="jit-lab">40%</span></label>
            <input type="range" id="jit-in" min="0" max="100" value="40">
        </div>

        <div class="stats-box" id="stats-out">--</div>

        <button class="btn-main" id="gen-btn">🎲 重新生成随机布局</button>
        <button class="btn-sub" id="dl-btn">💾 导出实验图片 (PNG)</button>
        <div class="hint">
            * 算法通过安全半径计算，确保 100% 抖动也不会产生重叠。<br>
            * 命名: 条件-颜色比例-形状比例.png
        </div>
    </aside>

    <main class="main-display">
        <div class="canvas-card">
            <canvas id="main-cvs" width="800" height="800"></canvas>
        </div>
    </main>
</div>

<script>
    const el = id => document.getElementById(id);
    const cvs = el('main-cvs'), ctx = cvs.getContext('2d');
    
    const COLOR_Y = 'rgb(235, 240, 170)'; 
    const COLOR_B = 'rgb(125, 205, 205)'; 

    const presets = {
        'Congruent':   { py: 50, tsy: 100, bsb: 100 },
        'LowConflict': { py: 50, tsy: 70,  bsb: 70  },
        'HighConflict':{ py: 50, tsy: 50,  bsb: 50  },
        'Baseline':    { py: 50, tsy: 100, bsb: 0   } 
    };

    function drawShape(type, x, y, size, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        if (type === 'tri') {
            const h = size * 1.1; 
            ctx.moveTo(x, y - h/2);
            ctx.lineTo(x - size/1.8, y + h/2);
            ctx.lineTo(x + size/1.8, y + h/2);
        } else {
            ctx.rect(x - size/2, y - size/2, size, size);
        }
        ctx.fill();
        ctx.closePath();
    }

    function run() {
        const cond = el('cond-in').value;
        const total = parseInt(el('n-in').value) || 36;
        const layout = el('layout-in').value;
        const jitterParam = parseInt(el('jit-in').value) / 100;

        if (cond !== 'Custom') {
            const p = presets[cond];
            el('py-in').value = p.py;
            el('tsy-in').value = p.tsy;
            el('bsb-in').value = p.bsb;
            el('custom-params').style.opacity = "0.6";
            el('custom-params').style.pointerEvents = "none";
        } else {
            el('custom-params').style.opacity = "1";
            el('custom-params').style.pointerEvents = "auto";
        }

        const pY = parseInt(el('py-in').value) / 100;
        const pTriInY = parseInt(el('tsy-in').value) / 100;
        const pSqInB = parseInt(el('bsb-in').value) / 100;

        el('n-lab').innerText = total;
        el('py-lab').innerText = (pY*100).toFixed(0) + '%';
        el('tsy-lab').innerText = (pTriInY*100).toFixed(0) + '%';
        el('bsb-lab').innerText = (pSqInB*100).toFixed(0) + '%';
        el('jit-lab').innerText = (jitterParam*100).toFixed(0) + '%';

        // 数量配额计算
        const countY = Math.round(total * pY);
        const countB = total - countY;
        const nY_Tri = Math.round(countY * pTriInY);
        const nY_Sq  = countY - nY_Tri;
        const nB_Sq  = Math.round(countB * pSqInB);
        const nB_Tri = countB - nB_Sq;

        el('stats-out').innerHTML = `
            <b>[分类统计]</b><br>
            黄三角(目标): ${nY_Tri} | 黄正方: ${nY_Sq}<br>
            蓝正方: ${nB_Sq} | 蓝三角: ${nB_Tri}<br>
            ----------------<br>
            总验证数: ${nY_Tri + nY_Sq + nB_Sq + nB_Tri}
        `;

        let items = [];
        for(let i=0; i<nY_Tri; i++) items.push({c: COLOR_Y, s: 'tri'});
        for(let i=0; i<nY_Sq;  i++) items.push({c: COLOR_Y, s: 'sq'});
        for(let i=0; i<nB_Sq;  i++) items.push({c: COLOR_B, s: 'sq'});
        for(let i=0; i<nB_Tri; i++) items.push({c: COLOR_B, s: 'tri'});
        items.sort(() => Math.random() - 0.5);

        ctx.clearRect(0, 0, cvs.width, cvs.height);
        
        // 核心排布算法
        const margin = 100;
        const activeArea = 800 - margin * 2;
        
        // 计算安全间距以防止碰撞
        // 理论最大半径 R = 300, 面积 A = PI * R^2. 每个点占面积 A/N. 
        // 间距 d 约为 sqrt(A/N).
        const safeDist = Math.sqrt((Math.PI * 300 * 300) / total) * 0.8;
        const shapeSize = safeDist * 0.5;

        items.forEach((item, i) => {
            let x, y;
            if (layout === 'circle') {
                // Vogel Spiral 算法确保均匀圆分布
                const goldenAngle = Math.PI * (3 - Math.sqrt(5));
                const r = 300 * Math.sqrt(i / total);
                const theta = i * goldenAngle;
                
                // 限制抖动在安全圆周内
                const maxJit = (safeDist * 0.4) * jitterParam;
                const jX = (Math.random() - 0.5) * maxJit;
                const jY = (Math.random() - 0.5) * maxJit;

                x = 400 + Math.cos(theta) * r + jX;
                y = 400 + Math.sin(theta) * r + jY;
            } else {
                // 矩形网格抖动
                const rows = Math.ceil(Math.sqrt(total));
                const cols = Math.ceil(total / rows);
                const cellW = activeArea / cols;
                const cellH = activeArea / rows;
                
                const r = Math.floor(i / cols);
                const c = i % cols;

                const maxJitW = (cellW - shapeSize) * 0.5 * jitterParam;
                const maxJitH = (cellH - shapeSize) * 0.5 * jitterParam;

                x = margin + c * cellW + cellW/2 + (Math.random()-0.5) * maxJitW * 2;
                y = margin + r * cellH + cellH/2 + (Math.random()-0.5) * maxJitH * 2;
            }

            drawShape(item.s, x, y, shapeSize, item.c);
        });
    }

    el('dl-btn').onclick = () => {
        const cond = el('cond-in').value;
        const py = el('py-in').value;
        const tsy = el('tsy-in').value;
        const link = document.createElement('a');
        link.download = `${cond}-${py}-${tsy}.png`;
        link.href = cvs.toDataURL("image/png");
        link.click();
    };

    el('gen-btn').onclick = run;
    ['cond-in', 'n-in', 'layout-in', 'py-in', 'tsy-in', 'bsb-in', 'jit-in'].forEach(id => {
        el(id).onchange = run;
        el(id).oninput = run;
    });

    run();
</script>
</body>
</html>
